services:
  - type: web
    name: scholarflow-backend
    runtime: node
    plan: free
    buildCommand: npm install --no-audit --no-fund
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: true
